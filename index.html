<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AT Script Hub - Tier Dewa</title>
<style>
/* ===== Reset & Base ===== */
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Arial', sans-serif;}
body { background:#0f0f0f; color:white; }

/* ===== Loading ===== */
#loading{
  position:fixed; width:100%; height:100%; background:#111; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:999;
}
#loading h1{ font-size:50px; margin-bottom:20px; color:#00ffc8;}
#progressBar{ width:300px; height:20px; background:#222; border-radius:10px; overflow:hidden; margin-bottom:20px;}
#progressFill{ width:0%; height:100%; background:#00ffc8; transition:width 0.2s;}
#skip{ padding:10px 25px; background:#00ffc8; border:none; cursor:pointer; border-radius:5px; color:#000; font-weight:bold;}

/* ===== Header & Nav ===== */
#logo{ text-align:center; font-size:70px; margin:30px 0; color:#00ffc8; font-weight:bold;}
nav{ display:flex; justify-content:center; gap:15px; flex-wrap:wrap; margin-bottom:20px;}
nav button{ padding:10px 20px; border:none; background:#00ffc8; cursor:pointer; border-radius:5px; font-weight:bold; color:#000;}
.page{ display:none; padding:10px 20px;}
.active{ display:block;}

/* ===== Cards ===== */
.grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px;}
.card{ background:#1c1c1c; padding:15px; border-radius:10px; box-shadow:0 0 10px #00ffc8; transition:transform 0.2s; }
.card:hover{ transform:translateY(-5px);}
.card img{ max-width:100%; border-radius:8px; margin-bottom:10px;}
.card h3{ margin-bottom:10px; color:#00ffc8;}
.vote button{ margin:5px; padding:5px 10px; border:none; border-radius:5px; cursor:pointer; font-weight:bold;}
.vote button:disabled{ opacity:0.5; cursor:not-allowed;}
.commentList{ margin-top:10px; max-height:150px; overflow-y:auto;}
.comment{ background:#111; padding:5px; margin-top:5px; border-radius:5px;}
textarea{ width:100%; height:100px; border-radius:5px; padding:5px; background:#222; color:white; border:none;}

/* ===== Forms ===== */
input, textarea, select{ margin:5px 0; padding:8px; width:100%; border-radius:5px; border:none; background:#222; color:white;}
button.uploadBtn, button.editBtn{ background:#00ffc8; color:#000; border:none; padding:10px; font-weight:bold; cursor:pointer; border-radius:5px; margin-top:10px;}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <h1>Loading AT™</h1>
  <div id="progressBar"><div id="progressFill"></div></div>
  <button id="skip" onclick="finishLoading()">Skip</button>
</div>

<div id="logo">AT™</div>

<nav>
  <button onclick="showPage('games')">Games</button>
  <button onclick="showPage('scripts')">Scripts</button>
  <button onclick="showPage('upload')">Upload</button>
  <button onclick="showPage('login')">Login/Register</button>
</nav>

<!-- Pages -->

<!-- Login/Register -->
<div id="login" class="page">
<h2>Login / Register</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password akun">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<p id="loginMsg"></p>
</div>

<!-- Games -->
<div id="games" class="page active">
<h2>Games</h2>
<div class="grid" id="gameList"></div>
</div>

<!-- Scripts -->
<div id="scripts" class="page">
<h2>Scripts</h2>
<div class="grid" id="scriptList"></div>
</div>

<!-- Upload -->
<div id="upload" class="page">
<h2>Upload / Edit Item</h2>
<select id="uploadType">
<option value="game">Game</option>
<option value="script">Script</option>
</select>
<input id="itemName" placeholder="Nama Game/Script">
<input id="itemLink" placeholder="Link Game / URL (optional)">
<input type="file" id="itemPhoto" accept="image/*">
<textarea id="itemCode" placeholder="Kode Script (jika script)"></textarea>
<select id="privacySelect">
  <option value="public">Public</option>
  <option value="private">Private (hanya akunmu)</option>
</select>
<input type="hidden" id="editingIndex">
<button class="uploadBtn" onclick="uploadItem()">Upload / Save</button>
<p id="uploadMsg"></p>
</div>

<script>
// ===== Loading Screen =====
let progress=0;
let loadingInterval=setInterval(()=>{
  progress+=1;
  document.getElementById("progressFill").style.width=progress+"%";
  if(progress>=100){ finishLoading(); clearInterval(loadingInterval);}
},100); // ~10 detik
function finishLoading(){ document.getElementById("loading").style.display="none";}

// ===== Pages =====
function showPage(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
}

// ===== LocalStorage Prototype =====
let users = JSON.parse(localStorage.getItem("users")||"{}");
let currentUser = localStorage.getItem("currentUser")||null;
let games = JSON.parse(localStorage.getItem("games")||"[]");
let scripts = JSON.parse(localStorage.getItem("scripts")||"[]");
let votes = JSON.parse(localStorage.getItem("votes")||"{}"); // {user:{itemId:'like'/'dislike'}}

// ===== Login/Register =====
function register(){
  let email=document.getElementById("email").value.trim();
  let pwd=document.getElementById("password").value.trim();
  if(!email||!pwd){ document.getElementById("loginMsg").innerText="Isi semua field"; return;}
  if(users[email]){ document.getElementById("loginMsg").innerText="Email sudah terdaftar"; return;}
  users[email]={password:pwd};
  localStorage.setItem("users",JSON.stringify(users));
  currentUser=email; localStorage.setItem("currentUser",currentUser);
  document.getElementById("loginMsg").innerText="Berhasil register & login!";
  loadItems();
}
function login(){
  let email=document.getElementById("email").value.trim();
  let pwd=document.getElementById("password").value.trim();
  if(users[email] && users[email].password===pwd){
    currentUser=email; localStorage.setItem("currentUser",currentUser);
    document.getElementById("loginMsg").innerText="Berhasil login!";
    loadItems();
  }else{ document.getElementById("loginMsg").innerText="Email atau password salah";}
}

// ===== Upload / Edit =====
function uploadItem(){
  if(!currentUser){ document.getElementById("uploadMsg").innerText="Login dulu!"; return;}
  let type=document.getElementById("uploadType").value;
  let name=document.getElementById("itemName").value.trim();
  let link=document.getElementById("itemLink").value.trim();
  let code=document.getElementById("itemCode").value.trim();
  let privacy=document.getElementById("privacySelect").value;
  let photoInput=document.getElementById("itemPhoto");
  let photo=photoInput.files[0]?URL.createObjectURL(photoInput.files[0]):"";
  let editingIndex=document.getElementById("editingIndex").value;

  if(!name){ document.getElementById("uploadMsg").innerText="Isi nama!"; return;}

  // Check duplicate
  let list=type==="game"?games:scripts;
  let duplicate=list.some((i,idx)=>i.name===name && idx!=editingIndex);
  if(duplicate){ document.getElementById("uploadMsg").innerText="Nama sudah ada!"; return;}

  let item={name,link,code,photo,privacy,owner:currentUser};

  if(editingIndex){ // edit existing
    list[editingIndex]=item;
    document.getElementById("editingIndex").value="";
  }else{
    list.push(item);
  }

  if(type==="game"){ games=list; localStorage.setItem("games",JSON.stringify(games)); } 
  else { scripts=list; localStorage.setItem("scripts",JSON.stringify(scripts)); }

  document.getElementById("uploadMsg").innerText="Berhasil upload!";
  document.getElementById("itemName").value="";
  document.getElementById("itemLink").value="";
  document.getElementById("itemCode").value="";
  photoInput.value="";
  loadItems();
}

// ===== Load Items =====
function loadItems(){
  if(!currentUser) return;
  // Games
  let gameGrid=document.getElementById("gameList"); gameGrid.innerHTML="";
  games.forEach((g,i)=>{
    if(g.privacy==="private" && g.owner!==currentUser) return;
    let card=document.createElement("div"); card.className="card";
    if(g.photo) card.innerHTML=`<img src="${g.photo}">`;
    card.innerHTML+=`<h3>${g.name}</h3>
    <button onclick="openLink('${g.link}')">Play</button>
    <div class="vote">
      <button onclick="vote('game',${i},'like',this)">👍 <span>${votes[currentUser]?.[g.name]==='like'?1:0}</span></button>
      <button onclick="vote('game',${i},'dislike',this)">👎 <span>${votes[currentUser]?.[g.name]==='dislike'?1:0}</span></button>
    </div>
    <input class="commentInput" placeholder="Komentar">
    <button onclick="addComment('game',${i},this)">Kirim</button>
    <div class="commentList" id="comment-game-${i}"></div>
    ${g.owner===currentUser?`<button class="editBtn" onclick="editItem('game',${i})">Edit</button>`:""}`;
    gameGrid.appendChild(card);
  });
  // Scripts
  let scriptGrid=document.getElementById("scriptList"); scriptGrid.innerHTML="";
  scripts.forEach((s,i)=>{
    if(s.privacy==="private" && s.owner!==currentUser) return;
    let card=document.createElement("div"); card.className="card";
    if(s.photo) card.innerHTML=`<img src="${s.photo}">`;
    card.innerHTML+=`<h3>${s.name}</h3><pre>${s.code}</pre>
    <div class="vote">
      <button onclick="vote('script',${i},'like',this)">👍 <span>${votes[currentUser]?.[s.name]==='like'?1:0}</span></button>
      <button onclick="vote('script',${i},'dislike',this)">👎 <span>${votes[currentUser]?.[s.name]==='dislike'?1:0}</span></button>
    </div>
    <input class="commentInput" placeholder="Komentar">
    <button onclick="addComment('script',${i},this)">Kirim</button>
    <div class="commentList" id="comment-script-${i}"></div>
    ${s.owner===currentUser?`<button class="editBtn" onclick="editItem('script',${i})">Edit</button>`:""}`;
    scriptGrid.appendChild(card);
  });
}

// ===== Open Link =====
function openLink(url){ window.open(url,"_blank");}

// ===== Voting =====
function vote(type,index,v,btn){
  if(!currentUser) return alert("Login dulu!");
  let list=type==="game"?games:scripts;
  let name=list[index].name;
  if(!votes[currentUser]) votes[currentUser]={};
  let prev=votes[currentUser][name];
  if(prev===v){ votes[currentUser][name]=null; } // unlike
  else { votes[currentUser][name]=v; }
  localStorage.setItem("votes",JSON.stringify(votes));
  loadItems();
}

// ===== Comments =====
function addComment(type,index,btn){
  if(!currentUser) return alert("Login dulu!");
  let list=type==="game"?games:scripts;
  let cList=list[index].comments||[];
  let input=btn.parentElement.querySelector(".commentInput");
  if(input.value.trim()==="") return;
  cList.push({user:currentUser,text:input.value});
  list[index].comments=cList;
  if(type==="game"){ localStorage.setItem("games",JSON.stringify(games)); } 
  else{ localStorage.setItem("scripts",JSON.stringify(scripts)); }
  input.value="";
  loadItems();
}

// ===== Edit Item =====
function editItem(type,index){
  let list=type==="game"?games:scripts;
  let item=list[index];
  document.getElementById("uploadType").value=type;
  document.getElementById("itemName").value=item.name;
  document.getElementById("itemLink").value=item.link||"";
  document.getElementById("itemCode").value=item.code||"";
  document.getElementById("privacySelect").value=item.privacy;
  document.getElementById("editingIndex").value=index;
  showPage("upload");
}

// ===== Init =====
loadItems();
</script>
</body>
</html>
